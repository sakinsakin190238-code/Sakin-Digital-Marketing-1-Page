<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Sakin | Digital Marketer</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --vivid-magenta: #ff00ff;
            --deep-violet: #1a0033;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at top right, #2e003e, #000000);
            color: white;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        header { text-align: center; padding: 50px 0; }
        
        h1 { 
            font-size: 3rem; 
            background: linear-gradient(90deg, var(--neon-cyan), var(--vivid-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .cta-btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        /* Responsive Image Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .gallery-item {
            background: var(--glass);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .gallery-item:hover { transform: scale(1.05); }

        img {
            width: 100%;
            border-radius: 10px;
            height: 250px;
            object-fit: cover;
        }

        footer { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>

    <header>
        <h1>S K SAKIN</h1>
        <p>Expert Digital Marketer | Transforming Brands</p>
        <br>
        <!-- https://www.fiverr.com/s/gDAGlZE-->
        <a href="YOUR_FIVERR_LINK_HERE" class="cta-btn">HIRE ME ON FIVERR</a>
    </header>

    <div class="gallery-grid">
        <!-- ইমেজ পোস্ট করার জায়গা -->
        <div class="gallery-item"><img src="https://via.placeholder.com/400x300/ff00ff/000000?text=Project+1" alt="Work"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/400x300/00f2ff/000000?text=Project+2" alt="Work"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/400x300/ff00ff/000000?text=Project+3" alt="Work"></div>
    </div>

    <footer>
        <p>© 2026 S K Sakin | Digital Marketing Portfolio</p>
    </footer>

</body>
  </html>
